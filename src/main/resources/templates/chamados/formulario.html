<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${chamado.id != null ? 'Editar Chamado' : 'Novo Chamado'} + ' – Morhar'">Chamado</title>
    <link rel="stylesheet" href="/css/morhar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
    <style>
        .form-topbar {
            background: var(--app-dark); color: white; padding: 0 18px;
            height: var(--header-h); display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 100;
        }
        .form-topbar-center { font-size: 15px; font-weight: 700; }
        .form-topbar-sub    { font-size: 10px; opacity: .65; }

        .form-inner {
            padding: 16px 16px 24px;
            max-width: 100%;
        }
        .form-section-title {
            font-size: 13px; font-weight: 700; color: var(--text-secondary);
            margin-bottom: 14px; display: flex; align-items: center; gap: 7px;
            padding-bottom: 10px; border-bottom: 2px solid #f1f5f9;
        }
        .form-section-title i { color: var(--app-accent); font-size: 16px; }

        .char-count { font-size: 10px; color: var(--text-muted); text-align: right; margin-top: 3px; }

        @media (min-width: 768px) {
            .form-topbar { display: none; }
            .form-inner  { max-width: 760px; margin: 0 auto; padding: 24px 28px; }
            .steps-bar   { max-width: 760px; margin: 0 auto; padding: 16px 28px; }
        }
    </style>
</head>
<body>
<div class="app-wrapper">

    <!-- Mobile top bar -->
    <div class="form-topbar mobile-only">
        <a th:href="${chamado.id != null} ? @{/chamados/{id}(id=${chamado.id})} : '/chamados'"
           style="color:white;text-decoration:none">
            <i class="bi bi-arrow-left" style="font-size:22px"></i>
        </a>
        <div style="text-align:center">
            <div class="form-topbar-center" th:text="${chamado.id != null ? 'Editar Chamado' : 'Novo Chamado'}">Chamado</div>
            <div class="form-topbar-sub">Preencha os dados do atendimento</div>
        </div>
        <div style="width:22px"></div>
    </div>

    <!-- Desktop header -->
    <header class="app-header desktop-only">
        <div style="flex:1;display:flex;align-items:center;gap:12px">
            <a th:href="${chamado.id != null} ? @{/chamados/{id}(id=${chamado.id})} : '/chamados'"
               style="color:white;text-decoration:none;display:flex;align-items:center;gap:8px">
                <i class="bi bi-arrow-left" style="font-size:20px"></i>
                <span style="font-size:13px;opacity:.75" th:text="${chamado.id != null ? 'Editar' : 'Chamados'}">Chamados</span>
            </a>
        </div>
        <div class="header-logo">
            <img src="/images/logo-morhar.png" width="32" height="32" alt="Morhar" style="object-fit:contain">
            <div>
                <div class="header-logo-text">MORHAR</div>
                <span class="header-logo-sub">AUTOMAÇÃO</span>
            </div>
        </div>
        <div class="header-right-group" style="flex:1;justify-content:flex-end">
            <div class="header-user">
                <span class="header-username" th:text="${#authentication.name}">Usuário</span>
                <div class="header-avatar" th:text="${#strings.toUpperCase(#authentication.name.substring(0,1))}">U</div>
            </div>
            <div style="position:relative"><i class="bi bi-bell header-icon"></i><span class="notif-badge">3</span></div>
        </div>
    </header>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-group-label">MENU PRINCIPAL</div>
        <a href="/dashboard" class="sidebar-item"><i class="bi bi-house-fill"></i> Dashboard</a>
        <a href="/chamados"  class="sidebar-item active"><i class="bi bi-file-text"></i> Chamados</a>
        <a href="/clientes"  class="sidebar-item" sec:authorize="hasRole('ADMIN')"><i class="bi bi-people"></i> Clientes</a>
        <a href="/tecnicos"  class="sidebar-item" sec:authorize="hasRole('ADMIN')"><i class="bi bi-person-gear"></i> Técnicos</a>
        <a href="/agenda"    class="sidebar-item"><i class="bi bi-calendar3"></i> Agenda</a>
        <div class="sidebar-group-label">SISTEMA</div>
        <a href="/perfil"    class="sidebar-item"><i class="bi bi-person"></i> Perfil</a>
        
        <div class="sidebar-footer">
            <form th:action="@{/logout}" method="post" style="margin:0">
                <button type="submit" class="sidebar-item" style="background:none;border:none;cursor:pointer;font:inherit;width:100%">
                    <i class="bi bi-box-arrow-left"></i> Sair
                </button>
            </form>
        </div>
    </nav>

    <!-- Content -->
    <main class="app-content" style="padding-bottom:100px">

        <!-- Steps bar -->
        <div class="steps-bar" style="border-bottom:1px solid #e2e8f0">
            <div class="step">
                <div class="step-circle active">1</div>
                <div class="step-label active">Chamado</div>
            </div>
            <div class="step-conn"></div>
            <div class="step">
                <div class="step-circle inactive">2</div>
                <div class="step-label inactive">Endereço</div>
            </div>
            <div class="step-conn"></div>
            <div class="step">
                <div class="step-circle inactive">3</div>
                <div class="step-label inactive">Serviço</div>
            </div>
            <div class="step-conn"></div>
            <div class="step">
                <div class="step-circle inactive">4</div>
                <div class="step-label inactive">Resumo</div>
            </div>
        </div>

        <form th:action="@{/chamados/salvar}" th:object="${chamado}" method="post">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{numero}">
            <input type="hidden" th:field="*{dataAbertura}">
            <input type="hidden" th:field="*{horaAbertura}">
            <input type="hidden" th:field="*{ultimaAtualizacao}">

            <div class="form-inner">
                <!-- Dados do chamado -->
                <div style="background:white;border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)">
                    <div class="form-section-title"><i class="bi bi-file-text-fill"></i> Dados do chamado</div>

                    <div class="form-row" style="margin-bottom:12px">
                        <div class="form-field">
                            <label class="form-label">Cliente <span class="req">*</span></label>
                            <select th:field="*{clienteNome}" class="form-select" required>
                                <option value="">Selecione o cliente</option>
                                <option th:each="c : ${clientes}"
                                        th:value="${c.nome}"
                                        th:text="${c.nome + ' (' + (c.perfil == 'Pessoa Física' ? 'PF' : 'PJ') + ')'}">
                                </option>
                            </select>
                        </div>
                        <div class="form-field">
                            <label class="form-label">Status <span class="req">*</span></label>
                            <select th:field="*{status}" class="form-select" required>
                                <option value="">Selecione</option>
                                <option value="Aberto">Aberto</option>
                                <option value="Em andamento">Em andamento</option>
                                <option value="Finalizado">Finalizado</option>
                                <option value="Urgente">Urgente</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-field" style="margin-bottom:12px">
                        <label class="form-label">Endereço</label>
                        <input type="text" th:field="*{endereco}" class="form-control" placeholder="Rua, número – Bairro">
                    </div>

                    <div class="form-field">
                        <label class="form-label">Descrição do problema <span class="req">*</span></label>
                        <textarea th:field="*{descricao}" class="form-control" rows="4"
                                  maxlength="1000" id="descText" oninput="updateCount()"
                                  placeholder="Descreva o problema ou serviço solicitado..."></textarea>
                        <div class="char-count"><span id="charCount">0</span>/1000</div>
                    </div>
                </div>

                <!-- Dados do serviço -->
                <div style="background:white;border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)">
                    <div class="form-section-title"><i class="bi bi-tools"></i> Dados do serviço</div>

                    <div class="form-row" style="margin-bottom:12px">
                        <div class="form-field">
                            <label class="form-label">Prioridade <span class="req">*</span></label>
                            <select th:field="*{prioridade}" class="form-select" required>
                                <option value="">Selecione</option>
                                <option value="Alta">Alta</option>
                                <option value="Média">Média</option>
                                <option value="Baixa">Baixa</option>
                            </select>
                        </div>
                        <div class="form-field">
                            <label class="form-label">Equipe</label>
                            <select th:field="*{equipe}" class="form-select">
                                <option value="">Selecione</option>
                                <option value="Instalações">Instalações</option>
                                <option value="Manutenção">Manutenção</option>
                                <option value="Suporte">Suporte</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-field">
                        <label class="form-label">Técnico responsável</label>
                        <select th:field="*{tecnico}" class="form-select">
                            <option value="">Selecione o técnico</option>
                            <option value="Carlos Silva">Carlos Silva</option>
                            <option value="João Santos">João Santos</option>
                            <option value="Pedro Lima">Pedro Lima</option>
                        </select>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-app-primary" style="width:100%;border-radius:14px;padding:15px">
                    <i class="bi bi-floppy"></i>
                    <span th:text="${chamado.id != null ? 'Salvar alterações' : 'Salvar e continuar'}">Salvar</span>
                </button>
            </div>
        </form>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="/dashboard" class="nav-item"><i class="bi bi-house-fill"></i><span>Dashboard</span></a>
        <a href="/chamados"  class="nav-item active"><i class="bi bi-file-text"></i><span>Chamados</span></a>
        <a href="/clientes"  class="nav-item"><i class="bi bi-people"></i><span>Clientes</span></a>
        <a href="/agenda"    class="nav-item"><i class="bi bi-calendar3"></i><span>Agenda</span></a>
        <a href="#"          class="nav-item"><i class="bi bi-three-dots"></i><span>Mais</span></a>
    </nav>
</div>

<script>
    function updateCount() {
        const t = document.getElementById('descText');
        document.getElementById('charCount').textContent = t.value.length;
    }
    updateCount();
</script>
</body>
</html>
