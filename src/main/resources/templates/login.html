<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Morhar Automação – Login</title>
    <link rel="stylesheet" href="/css/morhar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-wrapper {
            width: 100%; max-width: 400px; padding: 24px 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .login-card {
            background: white; border-radius: 24px;
            padding: 40px 28px; width: 100%;
            box-shadow: 0 4px 28px rgba(0,0,0,0.09);
        }
        .logo-box {
            width: 80px; height: 80px; margin: 0 auto 16px;
            background: #f0fafa; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
        }
        .brand { font-size: 26px; font-weight: 800; color: #0f2549; letter-spacing: 3px; text-align: center; }
        .brand-sub { font-size: 11px; letter-spacing: 4px; color: #64748b; text-align: center; text-transform: uppercase; margin-bottom: 28px; }
        .field-box {
            background: #f8fafc; border: 1.5px solid #e2e8f0;
            border-radius: 16px; padding: 14px 18px;
            display: flex; align-items: center; gap: 14px; margin-bottom: 14px;
            transition: border-color 0.15s;
        }
        .field-box:focus-within { border-color: #2563eb; background: white; }
        .field-box i { color: #2563eb; font-size: 20px; flex-shrink: 0; }
        .field-inner { flex: 1; }
        .field-label { font-size: 11px; color: #94a3b8; margin-bottom: 2px; }
        .field-inner input {
            border: none; background: transparent; outline: none;
            width: 100%; font-size: 15px; color: #1e293b;
        }
        .field-inner input::placeholder { color: #cbd5e1; }
        .eye-btn { color: #94a3b8; cursor: pointer; font-size: 18px; }
        .btn-login {
            background: #1e3a8a; color: white; border: none; border-radius: 16px;
            padding: 16px; width: 100%; font-size: 15px; font-weight: 700;
            letter-spacing: 0.5px; cursor: pointer; margin-top: 6px;
            transition: background 0.15s;
        }
        .btn-login:hover { background: #1e40af; }
        .alert-error {
            background: #fef2f2; border: 1.5px solid #fca5a5; color: #dc2626;
            border-radius: 12px; padding: 12px 16px; font-size: 13px;
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }
        .alert-success {
            background: #f0fdf4; border: 1.5px solid #86efac; color: #16a34a;
            border-radius: 12px; padding: 12px 16px; font-size: 13px;
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <!-- Logo -->
        <div class="logo-box">
            <img src="/images/logo-morhar.png" width="56" height="56" alt="Morhar" style="object-fit:contain">
        </div>
        <div class="brand">MORHAR</div>
        <div class="brand-sub">Automação</div>

        <p style="font-size:20px;font-weight:700;color:#1e293b;margin-bottom:4px">Bem-vindo!</p>
        <p style="font-size:13px;color:#64748b;margin-bottom:20px">Faça login para acessar o sistema.</p>

        <div class="alert-error" th:if="${param.error}">
            <i class="bi bi-exclamation-circle-fill"></i>
            Usuário ou senha inválidos.
        </div>
        <div class="alert-success" th:if="${param.logout}">
            <i class="bi bi-check-circle-fill"></i>
            Sessão encerrada com sucesso.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="field-box">
                <i class="bi bi-person"></i>
                <div class="field-inner">
                    <div class="field-label">Usuário</div>
                    <input type="text" name="username" placeholder="Digite seu usuário" autocomplete="username">
                </div>
            </div>

            <div class="field-box">
                <i class="bi bi-lock"></i>
                <div class="field-inner">
                    <div class="field-label">Senha</div>
                    <input type="password" name="password" id="pwd" placeholder="Digite sua senha" autocomplete="current-password">
                </div>
                <i class="bi bi-eye eye-btn" id="eyeIcon" onclick="togglePwd()"></i>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div style="text-align:center;margin-top:18px">
            <a href="/recuperar-senha" style="font-size:13px;color:#2563eb;text-decoration:none">
                Esqueceu sua senha?
            </a>
        </div>
    </div>
</div>

<script>
    function togglePwd() {
        const i = document.getElementById('pwd');
        const e = document.getElementById('eyeIcon');
        if (i.type === 'password') { i.type = 'text'; e.className = 'bi bi-eye-slash eye-btn'; }
        else { i.type = 'password'; e.className = 'bi bi-eye eye-btn'; }
    }
</script>
</body>
</html>
