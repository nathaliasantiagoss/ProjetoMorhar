<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recuperar Senha – Morhar</title>
    <link rel="stylesheet" href="/css/morhar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
    <style>
        body {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 100vh;
        }
        .login-wrapper { width: 100%; max-width: 400px; padding: 24px 20px; }
        .login-card {
            background: white; border-radius: 24px; padding: 40px 28px; width: 100%;
            box-shadow: 0 4px 28px rgba(0,0,0,0.09);
        }
        .logo-box {
            width: 72px; height: 72px; margin: 0 auto 16px;
            background: #f0fafa; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
        }
        .brand     { font-size: 24px; font-weight: 800; color: #0f2549; letter-spacing: 3px; text-align: center; }
        .brand-sub { font-size: 11px; letter-spacing: 4px; color: #64748b; text-align: center; text-transform: uppercase; margin-bottom: 28px; }
        .field-box {
            background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 16px;
            padding: 14px 18px; display: flex; align-items: center; gap: 14px; margin-bottom: 14px;
            transition: border-color 0.15s;
        }
        .field-box:focus-within { border-color: #2563eb; background: white; }
        .field-box i { color: #2563eb; font-size: 20px; flex-shrink: 0; }
        .field-inner { flex: 1; }
        .field-label { font-size: 11px; color: #94a3b8; margin-bottom: 2px; }
        .field-inner input { border: none; background: transparent; outline: none; width: 100%; font-size: 15px; color: #1e293b; }
        .field-inner input::placeholder { color: #cbd5e1; }
        .btn-submit {
            background: #1e3a8a; color: white; border: none; border-radius: 16px;
            padding: 16px; width: 100%; font-size: 15px; font-weight: 700;
            cursor: pointer; margin-top: 6px; transition: background 0.15s;
        }
        .btn-submit:hover { background: #1e40af; }
        .alert-error {
            background: #fef2f2; border: 1.5px solid #fca5a5; color: #dc2626;
            border-radius: 12px; padding: 12px 16px; font-size: 13px;
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }
        .alert-success {
            background: #f0fdf4; border: 1.5px solid #86efac; color: #16a34a;
            border-radius: 12px; padding: 12px 16px; font-size: 13px;
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="logo-box">
            <img src="/images/logo-morhar.png" width="56" height="56" alt="Morhar" style="object-fit:contain">
        </div>
        <div class="brand">MORHAR</div>
        <div class="brand-sub">Automação</div>

        <p style="font-size:20px;font-weight:700;color:#1e293b;margin-bottom:4px">Recuperar senha</p>
        <p style="font-size:13px;color:#64748b;margin-bottom:20px">
            Digite seu o e-mail cadastrado para redefinir sua senha.
        </p>

        <div class="alert-error" th:if="${erro}">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${erro}">Erro.</span>
        </div>
        <div class="alert-success" th:if="${param.sucesso}">
            <i class="bi bi-check-circle-fill"></i>
            Senha redefinida com sucesso! Faça o login.
        </div>

        <form th:action="@{/recuperar-senha}" method="post">
            <div class="field-box">
                <i class="bi bi-envelope"></i>
                <div class="field-inner">
                    <div class="field-label">E-mail do técnico</div>
                    <input type="email" name="email" placeholder="Digite o e-mail cadastrado" required>
                </div>
            </div>
            <button type="submit" class="btn-submit">Continuar</button>
        </form>

        <div style="text-align:center;margin-top:20px">
            <a href="/login" style="font-size:13px;color:#2563eb;text-decoration:none">
                <i class="bi bi-arrow-left"></i> Voltar ao login
            </a>
        </div>
    </div>
</div>
</body>
</html>
