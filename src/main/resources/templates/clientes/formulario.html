<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${form.id != null ? 'Editar Cliente' : 'Novo Cliente'} + ' – Morhar'">Cliente</title>
    <link rel="stylesheet" href="/css/morhar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
    <style>
        .form-topbar {
            background: var(--app-dark); color: white; padding: 0 18px;
            height: var(--header-h); display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 100;
        }
        .form-section {
            background: white; border-radius: 16px; padding: 18px; margin-bottom: 14px;
            box-shadow: 0 2px 10px rgba(0,0,0,.04);
        }
        .form-section-title {
            font-size: 13px; font-weight: 700; color: var(--text-secondary);
            margin-bottom: 14px; display: flex; align-items: center; gap: 7px;
            padding-bottom: 10px; border-bottom: 2px solid #f1f5f9;
        }
        .form-section-title i { color: var(--app-accent); font-size: 16px; }
        .readonly-field {
            background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 12px;
            padding: 11px 13px; font-size: 14px; color: var(--text-secondary);
            display: flex; align-items: center; gap: 8px;
        }
        @media (min-width: 768px) {
            .form-topbar { display: none; }
            .form-body    { max-width: 760px; margin: 0 auto; padding: 24px 28px; }
        }
    </style>
</head>
<body>
<div class="app-wrapper">

    <!-- Mobile top bar -->
    <div class="form-topbar mobile-only">
        <a href="/clientes" style="color:white;text-decoration:none">
            <i class="bi bi-arrow-left" style="font-size:22px"></i>
        </a>
        <div style="text-align:center">
            <div style="font-size:15px;font-weight:700" th:text="${form.id != null ? 'Editar Cliente' : 'Novo Cliente'}">Cliente</div>
            <div style="font-size:10px;opacity:.65">Cadastro de clientes</div>
        </div>
        <div style="width:22px"></div>
    </div>

    <!-- Desktop header -->
    <header class="app-header desktop-only">
        <div style="display:flex;align-items:center;gap:12px">
            <a href="/clientes" style="color:white;text-decoration:none;display:flex;align-items:center;gap:8px">
                <i class="bi bi-arrow-left" style="font-size:20px"></i>
                <span style="font-size:13px;opacity:.75">Clientes</span>
            </a>
        </div>
        <div class="header-logo">
            <svg width="26" height="26" viewBox="0 0 50 50" fill="none">
                <polygon points="25,5 45,18 45,40 25,48 5,40 5,18" fill="#0d9e9e" opacity=".9"/>
                <polygon points="32,30 45,22 45,40 32,40" fill="#f59e0b"/>
            </svg>
            <div>
                <div class="header-logo-text">MORHAR</div>
                <span class="header-logo-sub">AUTOMAÇÃO</span>
            </div>
        </div>
        <div class="header-right-group">
            <div class="header-user">
                <span class="header-username">João Silva</span>
                <div class="header-avatar">JS</div>
            </div>
            <div style="position:relative"><i class="bi bi-bell header-icon"></i><span class="notif-badge">3</span></div>
        </div>
    </header>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-group-label">MENU PRINCIPAL</div>
        <a href="/dashboard" class="sidebar-item"><i class="bi bi-house-fill"></i> Dashboard</a>
        <a href="/chamados"  class="sidebar-item"><i class="bi bi-file-text"></i> Chamados</a>
        <a href="/clientes"  class="sidebar-item active"><i class="bi bi-people"></i> Clientes</a>
        <a href="/agenda"    class="sidebar-item"><i class="bi bi-calendar3"></i> Agenda</a>
        <div class="sidebar-group-label">SISTEMA</div>
        <a href="#"          class="sidebar-item"><i class="bi bi-person"></i> Perfil</a>
        <a href="#"          class="sidebar-item"><i class="bi bi-gear"></i> Configurações</a>
        <div class="sidebar-footer">
            <a href="/login" class="sidebar-item"><i class="bi bi-box-arrow-left"></i> Sair</a>
        </div>
    </nav>

    <!-- Content -->
    <main class="app-content" style="padding-bottom:100px">

        <!-- Desktop page title -->
        <div class="desktop-only">
            <div class="page-title-bar">
                <div>
                    <h1 th:text="${form.id != null ? 'Editar Cliente' : 'Novo Cliente'}">Cliente</h1>
                    <p>Preencha os dados cadastrais do cliente.</p>
                </div>
            </div>
        </div>

        <form th:action="@{/clientes/salvar}" th:object="${form}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-body" style="padding: 16px 16px 0">

                <!-- Dados pessoais -->
                <div class="form-section">
                    <div class="form-section-title"><i class="bi bi-person-fill"></i> Dados pessoais</div>

                    <div class="form-field">
                        <label class="form-label">Nome completo / Razão social <span class="req">*</span></label>
                        <input type="text" th:field="*{nome}" class="form-control" placeholder="Digite o nome do cliente" required>
                    </div>

                    <div class="form-row" style="margin-bottom:0">
                        <div class="form-field">
                            <label class="form-label">Perfil</label>
                            <div th:if="${form.id == null}">
                                <select th:field="*{perfil}" id="perfil" class="form-select" onchange="atualizarDocumento()">
                                    <option value="Pessoa Física">Pessoa Física</option>
                                    <option value="Pessoa Jurídica">Pessoa Jurídica</option>
                                </select>
                            </div>
                            <div th:if="${form.id != null}">
                                <div class="readonly-field">
                                    <i class="bi bi-lock" style="color:var(--text-muted);font-size:13px"></i>
                                    <span th:text="*{perfil}">–</span>
                                </div>
                                <input type="hidden" th:field="*{perfil}">
                            </div>
                        </div>

                        <div class="form-field">
                            <label class="form-label" id="labelDocumento"
                                   th:text="${form.perfil == 'Pessoa Jurídica' ? 'CNPJ' : 'CPF'}">CPF</label>
                            <div th:if="${form.id == null}">
                                <input type="text" th:field="*{documento}" class="form-control" placeholder="000.000.000-00">
                            </div>
                            <div th:if="${form.id != null}">
                                <div class="readonly-field">
                                    <i class="bi bi-lock" style="color:var(--text-muted);font-size:13px"></i>
                                    <span th:text="*{documento}">–</span>
                                </div>
                                <input type="hidden" th:field="*{documento}">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Contato -->
                <div class="form-section">
                    <div class="form-section-title"><i class="bi bi-telephone-fill"></i> Contato</div>

                    <div class="form-field">
                        <label class="form-label">E-mail</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="email@exemplo.com.br">
                    </div>

                    <div class="form-field">
                        <label class="form-label">Telefone</label>
                        <input type="text" th:field="*{telefone}" class="form-control" placeholder="(81) 99999-9999">
                    </div>
                </div>

                <!-- Status e datas -->
                <div class="form-section">
                    <div class="form-section-title"><i class="bi bi-sliders"></i> Configurações</div>

                    <div class="form-row">
                        <div class="form-field">
                            <label class="form-label">Status</label>
                            <select th:field="*{status}" class="form-select">
                                <option value="Ativo">Ativo</option>
                                <option value="Inativo">Inativo</option>
                                <option value="Bloqueado">Bloqueado</option>
                            </select>
                        </div>
                        <div class="form-field" th:if="${form.id == null}">
                            <label class="form-label">Data de cadastro</label>
                            <input type="date" th:field="*{dataCadastro}" class="form-control">
                        </div>
                        <div class="form-field" th:if="${form.id != null}">
                            <label class="form-label">Data de cadastro</label>
                            <div class="readonly-field">
                                <i class="bi bi-calendar3" style="color:var(--text-muted);font-size:13px"></i>
                                <span th:text="*{dataCadastro}">–</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div style="display:flex;gap:10px;padding-bottom:8px">
                    <a href="/clientes" class="btn-app-secondary" style="flex:1;border-radius:14px">
                        <i class="bi bi-x"></i> Cancelar
                    </a>
                    <button type="submit" class="btn-app-primary" style="flex:2;border-radius:14px;border:none">
                        <i class="bi bi-floppy"></i>
                        <span th:text="${form.id != null ? 'Salvar alterações' : 'Cadastrar cliente'}">Salvar</span>
                    </button>
                </div>

            </div>
        </form>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="/dashboard" class="nav-item"><i class="bi bi-house-fill"></i><span>Dashboard</span></a>
        <a href="/chamados"  class="nav-item"><i class="bi bi-file-text"></i><span>Chamados</span></a>
        <a href="/clientes"  class="nav-item active"><i class="bi bi-people"></i><span>Clientes</span></a>
        <a href="/agenda"    class="nav-item"><i class="bi bi-calendar3"></i><span>Agenda</span></a>
        <a href="#"          class="nav-item"><i class="bi bi-three-dots"></i><span>Mais</span></a>
    </nav>
</div>

<script>
    function atualizarDocumento() {
        const perfil = document.getElementById('perfil');
        if (perfil) {
            document.getElementById('labelDocumento').textContent =
                perfil.value === 'Pessoa Jurídica' ? 'CNPJ' : 'CPF';
        }
    }
</script>
</body>
</html>
