<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2 class="mb-4">Gerenciamento de Clientes</h2>

    <div class="d-flex gap-2 mb-3">
        <form th:action="@{/clientes}" method="get" class="d-flex gap-2 flex-grow-1">
            <input type="text" name="nome" th:value="${nomeBusca}"
                   placeholder="Buscar por nome..." class="form-control">
            <button type="submit" class="btn btn-outline-secondary">Buscar</button>
            <a th:href="@{/clientes}" class="btn btn-outline-secondary">Limpar</a>
        </form>
        <a th:href="@{/clientes/novo}" class="btn btn-primary">+ Novo Cliente</a>
    </div>

    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Email</th>
                <th>Telefone</th>
                <th>Perfil</th>
                <th>Documento</th>
                <th>Status</th>
                <th>Data de Cadastro</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${clientes}">
                <td th:text="${c.id}"></td>
                <td th:text="${c.nome}"></td>
                <td th:text="${c.email}"></td>
                <td th:text="${c.telefone}"></td>
                <td th:text="${c.perfil}"></td>
                <td th:text="${c.documento}"></td>
                <td>
                    <span th:text="${c.status}"
                          th:class="${c.status == 'Ativo'} ? 'badge bg-success' : (${c.status == 'Inativo'} ? 'badge bg-secondary' : 'badge bg-danger')">
                    </span>
                </td>
                <td th:text="${c.dataCadastro}"></td>
                <td class="d-flex gap-1">
                    <a th:href="@{/clientes/editar/{id}(id=${c.id})}"
                       class="btn btn-sm btn-warning">Editar</a>
                    <form th:action="@{/clientes/excluir/{id}(id=${c.id})}" method="post"
                          onsubmit="return confirm('Deseja excluir este cliente?')">
                        <button type="submit" class="btn btn-sm btn-danger">Excluir</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(clientes)}">
                <td colspan="9" class="text-center text-muted py-3">Nenhum cliente encontrado.</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
