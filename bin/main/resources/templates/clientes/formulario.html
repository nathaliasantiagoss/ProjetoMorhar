<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${form.id != null ? 'Editar Cliente' : 'Novo Cliente'}">Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4" style="max-width: 600px">
    <h2 class="mb-4" th:text="${form.id != null ? 'Editar Cliente' : 'Novo Cliente'}">Cliente</h2>

    <form th:action="@{/clientes/salvar}" th:object="${form}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" th:field="*{nome}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Telefone</label>
            <input type="text" th:field="*{telefone}" class="form-control">
        </div>

        <!-- Perfil: editável apenas no cadastro -->
        <div class="mb-3">
            <label class="form-label">Perfil</label>
            <select th:if="${form.id == null}" th:field="*{perfil}" id="perfil"
                    class="form-select" onchange="atualizarDocumento()">
                <option value="Pessoa Física">Pessoa Física</option>
                <option value="Pessoa Jurídica">Pessoa Jurídica</option>
            </select>
            <div th:if="${form.id != null}" class="d-flex align-items-center gap-2">
                <span th:text="*{perfil}" class="form-control-plaintext fw-semibold"></span>
                <input type="hidden" th:field="*{perfil}">
            </div>
        </div>

        <!-- Documento: somente leitura na edição -->
        <div class="mb-3">
            <label class="form-label" id="labelDocumento"
                   th:text="${form.perfil == 'Pessoa Jurídica' ? 'CNPJ' : 'CPF'}">CPF</label>
            <input type="text" th:field="*{documento}" class="form-control"
                   th:readonly="${form.id != null}">
        </div>

        <div class="mb-3">
            <label class="form-label">Status</label>
            <select th:field="*{status}" class="form-select">
                <option value="Ativo">Ativo</option>
                <option value="Inativo">Inativo</option>
                <option value="Bloqueado">Bloqueado</option>
            </select>
        </div>

        <!-- Data de cadastro: somente no cadastro -->
        <div class="mb-3" th:if="${form.id == null}">
            <label class="form-label">Data de Cadastro</label>
            <input type="date" th:field="*{dataCadastro}" class="form-control">
        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a th:href="@{/clientes}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

<script>
    function atualizarDocumento() {
        const perfil = document.getElementById('perfil');
        if (perfil) {
            document.getElementById('labelDocumento').textContent =
                perfil.value === 'Pessoa Jurídica' ? 'CNPJ' : 'CPF';
        }
    }
</script>
</body>
</html>
